<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRC Conflict Data Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; padding: 20px; color: #1e293b; }
        .header { text-align: center; margin-bottom: 30px; }
        .nav-back { margin-bottom: 20px; display: inline-block; color: #2563eb; text-decoration: none; font-weight: 600; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .card h3 { margin-top: 0; font-size: 1.1rem; border-bottom: 1px solid #f1f5f9; padding-bottom: 10px; }
        canvas { width: 100% !important; height: 300px !important; }
        @media (max-width: 500px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div style="max-width: 1200px; margin: 0 auto;">
        <a href="index.html" class="nav-back">&larr; Back to Portal</a>
        <div class="header">
            <h1>Conflict Impact Dashboard</h1>
            <p>Analytical breakdown of georeferenced security events in DR Congo</p>
        </div>

        <div class="grid">
            <!-- Chart 1: Events Per Year -->
            <div class="card">
                <h3>Security Events Per Year</h3>
                <canvas id="eventsPerYear"></canvas>
            </div>

            <!-- Chart 2: Average Severity (Fatalities) -->
            <div class="card">
                <h3>Average Severity (Fatalities) Over Time</h3>
                <canvas id="severityOverTime"></canvas>
            </div>

            <!-- Chart 3: Types of Conflict -->
            <div class="card">
                <h3>Causes & Event Types</h3>
                <canvas id="eventTypes"></canvas>
            </div>

            <!-- Chart 4: Top 10 Affected Regions -->
            <div class="card">
                <h3>Top 10 Affected Regions</h3>
                <canvas id="topRegions"></canvas>
            </div>
        </div>
    </div>

    <script>
        async function initDashboard() {
            const response = await fetch('processed-data/drc-conflict-event.csv');
            const csvText = await response.text();
            
            Papa.parse(csvText, {
                header: true,
                dynamicTyping: true,
                complete: function(results) {
                    processData(results.data);
                }
            });
        }

        function processData(data) {
            const yearsMap = {};
            const severityMap = {};
            const typesMap = {};
            const regionsMap = {};

            data.forEach(row => {
                if (!row.date) return;
                
                // Extract Year
                const year = row.date.toString().split('-')[0];
                if (year && year > 1900) {
                    yearsMap[year] = (yearsMap[year] || 0) + 1;
                    
                    if (!severityMap[year]) severityMap[year] = { total: 0, count: 0 };
                    severityMap[year].total += (row.fatalities || 0);
                    severityMap[year].count += 1;
                }

                // Event Types
                if (row.event_type) {
                    typesMap[row.event_type] = (typesMap[row.event_type] || 0) + 1;
                }

                // Regions
                if (row.location) {
                    regionsMap[row.location] = (regionsMap[row.location] || 0) + 1;
                }
            });

            const sortedYears = Object.keys(yearsMap).sort();

            // 1. Bar Chart: Events Per Year
            new Chart(document.getElementById('eventsPerYear'), {
                type: 'bar',
                data: {
                    labels: sortedYears,
                    datasets: [{
                        label: 'Total Events',
                        data: sortedYears.map(y => yearsMap[y]),
                        backgroundColor: '#2563eb'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // 2. Line Chart: Severity
            new Chart(document.getElementById('severityOverTime'), {
                type: 'line',
                data: {
                    labels: sortedYears,
                    datasets: [{
                        label: 'Avg Fatalities per Event',
                        data: sortedYears.map(y => severityMap[y].total / severityMap[y].count),
                        borderColor: '#ef4444',
                        tension: 0.1,
                        fill: false
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // 3. Pie Chart: Event Types
            new Chart(document.getElementById('eventTypes'), {
                type: 'pie',
                data: {
                    labels: Object.keys(typesMap),
                    datasets: [{
                        data: Object.values(typesMap),
                        backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#64748b']
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom' } }
                }
            });

            // 4. Horizontal Bar: Top Regions
            const top10Regions = Object.entries(regionsMap)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10);

            new Chart(document.getElementById('topRegions'), {
                type: 'bar',
                data: {
                    labels: top10Regions.map(r => r[0]),
                    datasets: [{
                        label: 'Event Count',
                        data: top10Regions.map(r => r[1]),
                        backgroundColor: '#10b981'
                    }]
                },
                options: { 
                    indexAxis: 'y',
                    responsive: true, 
                    maintainAspectRatio: false 
                }
            });
        }

        initDashboard();
    </script>
</body>
</html>
